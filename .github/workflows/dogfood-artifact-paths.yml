name: dogfood-artifact-paths

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: dogfood-artifact-paths (ADR-017)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run check-dogfood-artifact-paths.sh
        run: bash scripts/check-dogfood-artifact-paths.sh
